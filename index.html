<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Project V1</title>
</head>
<body>
  <h1>Визуальный проект — Тест V1</h1>
  
  <input type="file" id="fileInput" accept="image/*">
  <canvas id="canvas" width="900" height="650" style="border:2px solid #333; display:block; margin-top:15px; max-width:100%;"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('fileInput');

    input.onchange = function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    console.log('%c[Visual V1] Загружено', 'color:#22c55e');
  </script>
</body>
</html>
